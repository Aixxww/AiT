<?xml version="1.0" encoding="UTF-8"?>
<svg width="600px" height="600px" viewBox="0 0 600 600" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>AiT 3D Faceted Logo</title>
    <defs>
        <linearGradient id="gradient_teal_to_blue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0000CD;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradient_purple_to_dark" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#800080;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#4B0082;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradient_copper_to_gold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#B87333;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
        </linearGradient>
        <radialGradient id="gradient_pink_glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" style="stop-color:#FF007F;stop-opacity:1" />
            <stop offset="60%" style="stop-color:#FF007F;stop-opacity:0.8" />
            <stop offset="100%" style="stop-color:#FF007F;stop-opacity:0" />
        </radialGradient>
        <filter id="glow_filter" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <g id="AiT_3D_Logo" transform="translate(300, 300) scale(1)">
        <path d="M-150,50 L-200,0 L-100,-100 L0,0 L-50,50 L-100,-25 Z" fill="url(#gradient_teal_to_blue)" stroke="#ffffff" stroke-width="2"/>
        <path d="M-200,0 L-250,50 L-150,150 L-50,50 Z" fill="url(#gradient_teal_to_blue)" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
        <circle cx="0" cy="-150" r="30" fill="url(#gradient_pink_glow)" filter="url(#glow_filter)"/>
        <path d="M0,-100 L-30,-70 L-30,70 L0,100 L30,70 L30,-70 Z" fill="url(#gradient_purple_to_dark)" stroke="#ffffff" stroke-width="2"/>
        <polyline points="-20,-50 -10,-40 -10,30 -20,40" fill="none" stroke="#DAA520" stroke-width="1.5"/>
        <polyline points="20,-50 10,-40 10,30 20,40" fill="none" stroke="#DAA520" stroke-width="1.5"/>
        <polyline points="0,-80 0,-60" fill="none" stroke="#DAA520" stroke-width="1.5"/>
        <path d="M0,0 L50,50 L150,50 L200,0 Z" fill="url(#gradient_copper_to_gold)" stroke="#ffffff" stroke-width="2"/>
        <path d="M100,-100 L50,-50 L150,50 L200,0 Z" fill="url(#gradient_copper_to_gold)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
        <path d="M100,-100 L200,0 L200,200 L100,100 Z" fill="url(#gradient_copper_to_gold)" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
        <polygon points="0,-250 216,-125 216,125 0,250 -216,125 -216,-125" fill="none" stroke="#f0f0f0" stroke-width="1" opacity="0.3"/>
    </g>
</svg>
